<!DOCTYPE html>
<html>
<head>
  <title>FLUX Pro Generator</title>
</head>
<body style="font-family:sans-serif;background:#111;color:#fff;text-align:center;padding:50px;">
  <h1>FLUX 2 Pro Generator 🚀</h1>
  <input id="prompt" style="width:60%;padding:10px;" placeholder="Enter prompt..."/>
  <br><br>
  <button onclick="generate()" style="padding:10px 20px;">Generate</button>
  <button id="downloadBtn" style="padding:10px 20px; display:none;">Download Image</button>
  <p id="status"></p>
  <img id="result" style="max-width:500px;margin-top:20px;"/>

<script>
  document.getElementById("downloadBtn").onclick = function () {
  const imageUrl = document.getElementById("result").src;
  const a = document.createElement("a");
  a.href = imageUrl;
  a.download = "generated-image.png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};
async function generate() {
  const prompt = document.getElementById("prompt").value.trim();
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");

  if (!prompt) {
    statusEl.innerText = "Please enter a prompt.";
    return;
  }

  statusEl.innerText = "Generating...";
  resultEl.removeAttribute("src");

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    console.log("FULL RESPONSE:", data);

    if (!res.ok) {
      statusEl.innerText = data.error || "Request failed";
      return;
    }

    if (!data.output) {
      statusEl.innerText = "No image returned";
      return;
    }

    const imageUrl = Array.isArray(data.output) ? data.output[0] : data.output;

    if (!imageUrl || typeof imageUrl !== "string") {
      statusEl.innerText = "Invalid image URL";
      return;
    }

    resultEl.src = imageUrl;
    resultEl.style.maxWidth = "500px";
    resultEl.style.marginTop = "20px";
    statusEl.innerText = "Done!";
  } catch (err) {
    console.error(err);
    statusEl.innerText = "Error: " + err.message;
  }
}
</script>
</body>
</html>
