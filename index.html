<!DOCTYPE html>
<html>
<head>
  <title>FLUX Pro Generator</title>
</head>
<body style="font-family:sans-serif;background:#111;color:#fff;text-align:center;padding:50px;">
  <h1>FLUX 2 Pro Generator 🚀</h1>
  <input id="prompt" style="width:60%;padding:10px;" placeholder="Enter prompt..."/>
  <br><br>
  <button onclick="generate()" style="padding:10px 20px;">Generate</button>
  <p id="status"></p>
  <img id="result" style="max-width:500px;margin-top:20px;"/>

<script>
async function generate(){
  const prompt = document.getElementById("prompt").value;
  document.getElementById("status").innerText = "Generating...";

  const res = await fetch("/api/generate", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  if(data.output){
    document.getElementById("result").src = data.output[0];
    document.getElementById("status").innerText = "Done!";
  } else {
    document.getElementById("status").innerText = data.error || "Error";
  }
}
</script>
</body>
</html>
